  extTab = type;
  regTab = null;
  renderDd();
}
function doShake(el){
  el.classList.remove('shake'); void el.offsetWidth;
  el.classList.add('shake');
  el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});
}

// ═══════════════════════════════════════════ DROPDOWN OPEN/CLOSE
let showFeedbackNums = true;
function toggleFeedbackNums(){
  showFeedbackNums = !showFeedbackNums;
  document.querySelectorAll('.num-badge, .num-badge-sm').forEach(el=>{
    el.style.display = showFeedbackNums ? '' : 'none';
  });
  const btn = document.getElementById('toggleNumBtn');
  if(btn) btn.textContent = showFeedbackNums ? '① 피드백 번호 숨기기' : '① 피드백 번호 보이기';
}
function openHashDemo(tag='#온트너'){
  openDd();
  const inp = document.getElementById('ddinp');
  if(!inp) return;
  inp.value = tag;
  inp.dispatchEvent(new Event('input'));
  inp.focus();
  setTimeout(()=>{ inp.setSelectionRange(inp.value.length, inp.value.length); }, 50);
}
function openDd(){
  renderDd(); renderRec();
  document.getElementById('dd').style.display='block';
  document.getElementById('sbox').classList.add('open');
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>document.getElementById('ddinp').focus(),50);
}
function closeDd(){
  document.getElementById('dd').style.display='none';
  document.getElementById('sbox').classList.remove('open');
  document.getElementById('ov').classList.remove('on');
  updateSboxMode(); // 닫힐 때 헤더를 현재 상태와 항상 동기화
}
function onKey(e){
  if(e.key==='Enter'){const q=e.target.value.trim();if(q)go(q);}
  if(e.key==='Escape') closeDd();
}
function onInput(e){
  const val = e.target.value;
  document.getElementById('inpClr').style.display = val ? 'block' : 'none';
  // # 으로 시작하면 해시태그 모드
  const isHash = val.startsWith('#');
  if(isHash !== hashtagMode){
    hashtagMode = isHash;
    renderHashtagBanner();
  }
}
function renderHashtagBanner(){
  const wrap = document.getElementById('ddTabsWrap');
  const existing = document.getElementById('hashtagBanner');
  if(hashtagMode && !existing){
    const banner = document.createElement('div');
    banner.id = 'hashtagBanner';
    banner.className = 'dd-hashtag-banner';
    banner.innerHTML = '# <strong>해시태그 검색 모드</strong> — #태그명으로 검색합니다. 탭 필터는 적용되지 않습니다.';
    wrap.insertBefore(banner, wrap.firstChild);
    // 2행 탭 흐릿하게
    const rows = wrap.querySelectorAll('.dd-row:nth-child(2)');
    rows.forEach(r=>r.style.opacity='0.3');
  } else if(!hashtagMode && existing){
    existing.remove();
    const rows = wrap.querySelectorAll('.dd-row');
    rows.forEach(r=>r.style.opacity='');
  }
}
function clearInp(){
  document.getElementById('ddinp').value='';
  document.getElementById('inpClr').style.display='none';
  document.getElementById('ddinp').focus();
}
document.addEventListener('keydown',e=>{
  if((e.altKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openDd();}
});

// ═══════════════════════════════════════════ RECENT
function renderRec(){
  const el=document.getElementById('recList');
  if(!recents.length){el.innerHTML='<div style="font-size:13px;color:var(--mut);padding:8px 4px">최근 검색어가 없습니다</div>';return;}
  el.innerHTML=recents.map((q,i)=>`
    <div class="rec-item" onclick="go('${q.replace(/'/g,"\\'")}')">
      <span class="rec-ico">🔍</span>
      <span class="rec-txt">${q}</span>
      <span class="rec-date">03-26</span>
      <button class="rec-del" onclick="event.stopPropagation();delRec(${i})">×</button>
    </div>`).join('');
}
function delRec(i){recents.splice(i,1);renderRec();}
function clearRec(){recents=[];renderRec();}

// ═══════════════════════════════════════════ SEARCH ENTRY
function qs(q,tab=null,naturalQ=null){
  if(tab){ aiOn=true; extTab=tab; regTab=null; }
  const displayQ = naturalQ || q.replace(/^(위키|캘린더|이메일) 검색:\s*/, '');
  go(q, !!tab, displayQ);
}
function go(q, keepTab=false, displayQ=null){
  if(!keepTab){ extTab=null; regTab=null; }
  if(!recents.includes(q)) recents.unshift(q);
  if(recents.length>8) recents=recents.slice(0,8);
  closeDd();
  curQ=q;
  curDisplayQ = displayQ||q;
  curTab = aiOn ? 'search' : 'all';
  const sph=document.getElementById('sph');
  sph.textContent=curDisplayQ; sph.className='sbox-ph has-val';
  updateSboxMode();
  startSearch();
}
function goBack(){
  document.getElementById('emptyS').style.display='';
  document.getElementById('resS').style.display='none';
  const sph=document.getElementById('sph');
  sph.textContent='업무, 파일, 대화를 자연어로 검색해보세요';
  sph.className='sbox-ph';
  updateSboxMode();
  clearTimeout(tmr);
}

// ═══════════════════════════════════════════ RENDER RESULT PAGE
function startSearch(){
  clearTimeout(tmr);

  // SC에 키가 없으면 자연어 라우팅 시도
  if(!SC[curQ]){
    const route = routeNL(curQ);
    if(route){
      // 내부 조회 키를 라우팅된 SC 키로 교체 (표시 쿼리는 유지)
      curQ = route.key;
      if(route.tab){ aiOn=true; extTab=route.tab; }
      renderTabsWrap();
      updateSboxMode();
    }
  }

  document.getElementById('emptyS').style.display='none';
  document.getElementById('resS').style.display='block';

  const isHash = curDisplayQ.startsWith('#');
  const hashBadge = isHash
    ? `<span style="background:#ede9fe;color:#6d28d9;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-right:6px"># 해시태그 검색</span>`
    : '';
  document.getElementById('rtit').innerHTML=`${hashBadge}"<em>${curDisplayQ}</em>" 검색 결과`;

  renderTabBar();
  renderContent();
}

function renderTabBar(){
  const s = SC[curQ];
  const sts = (s && s.stats) ? s.stats : {};
  const extOnly = aiOn && extTab !== null;
  const searchActive = curTab === 'search';
  const searchStyle = (!aiOn && !searchActive) ? 'opacity:.4;' : '';
  const searchOnClick = (!aiOn && !searchActive) ? `enableAiFromTab()` : `switchTab('search')`;
  const searchBtnClass = searchActive ? 'rt-search' : 'rt-search mode-browse';

  let html = `<button class="${searchBtnClass}" style="${searchStyle}" onclick="${searchOnClick}">✦ AI 검색</button>`;

  if(!extOnly){
    // 프로젝트 내부: 프로젝트·채팅 탭 없음
    const tabs = ctx==='project'
      ? [
          {id:'all',    label:'⊞ 전체 결과', cnt:(sts.post||0)+(sts.comment||0)+(sts.file||0)||null},
          {id:'post',   label:'≡ 게시물',    cnt:sts.post||null},
          {id:'comment',label:'💬 댓글',      cnt:sts.comment||null},
          {id:'file',   label:'□ 파일',      cnt:sts.file||null},
        ]
      : [
          {id:'all',    label:'⊞ 전체 결과', cnt:sts.total||null},
          {id:'proj',   label:'□ 프로젝트',  cnt:sts.proj||null},
          {id:'post',   label:'≡ 게시물',    cnt:sts.post||null},
          {id:'comment',label:'💬 댓글',      cnt:sts.comment||null},
          {id:'chat',   label:'○ 채팅',      cnt:sts.chat||null},
          {id:'file',   label:'□ 파일',      cnt:sts.file||null},
          // 구글 드라이브·알림은 해당 데이터가 있을 때만 표시
          ...(s && s.browse && s.browse.file && s.browse.file.some(f=>f.matchType==='drive') ? [{id:'drive', label:'📗 구글 드라이브', cnt:null}] : []),
          ...(sts.noti || (s && s.mode==='ai' && s.sum && s.sum.includes('[알림]')) ? [{id:'noti', label:'🔔 알림', cnt:sts.noti||null}] : []),
        ];

    html += `<div class="rtdiv"></div>`;
    tabs.filter(t => t.id==='all' || t.cnt).forEach(t=>{
      const cntHtml = t.cnt ? `<span class="rt-cnt">${t.cnt}${(s&&s.stats&&s.stats.total>t.cnt)?'+':''}</span>` : '';
      const on = curTab===t.id ? 'on' : '';
      html+=`<button class="rt ${on}" onclick="switchTab('${t.id}')">${t.label}${cntHtml}</button>`;
    });

    // 프로젝트 내부 컨텍스트 표시 배지
    if(ctx==='project'){
      html+=`<div style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);flex-shrink:0">
        <span style="background:#f0f0ff;border:1px solid #c7d7fd;border-radius:12px;padding:3px 10px;color:#3730a3;font-weight:600;font-size:11.5px">📁 ${PROJECT_NAME}</span>
      </div>`;
    }
  }

  document.getElementById('rtabsEl').innerHTML=html;
}

function switchTab(tabId){
  clearTimeout(tmr);  // 진행 중인 AI 검색 타이머 중단
  curTab=tabId;
  renderTabBar();
  renderContent();
}

function renderContent(){
  const area=document.getElementById('contentArea');
  area.innerHTML='';

  const extOnly = aiOn && extTab !== null;

  // 외부 단독 검색이거나 검색 탭이면 AI 카드 모드
  if(curTab==='search' || extOnly){
    renderAiOrEs(area);
  } else {
    renderBrowse(area);
  }
}

// ─────────── AI / ES 모드
function renderAiOrEs(area){
  const wrap = document.createElement('div');
  wrap.className='ai-layout';

  const main = document.createElement('div');
  main.className='ai-main';

  const right = document.createElement('div');
  right.className='src-panel';
  // 우측 패널 헤더
  right.innerHTML=`<div class="src-hd" id="srcHd">출처 (0)</div><div id="srcC"><div class="src-empty"><div style="font-size:32px;opacity:.25;margin-bottom:7px">📄</div><div style="font-size:12.5px;color:var(--mut)">검색 결과가 표시됩니다</div></div></div>`;

  wrap.appendChild(main);
  wrap.appendChild(right);
  area.appendChild(wrap);

  if(!aiOn){
    renderEsMode(main);
    const s=SC[curQ];
    if(s) renderSrcs(s.srcs.filter(r=>!r.ext));
  } else {
    const s=SC[curQ];
    if(!s) runFail(main,'retry');
    else if(s.mode==='fail') runFail(main, s.failType, s.failMsg);
    else renderAiCard(main,s);
  }
}

function renderEsMode(main){
  main.innerHTML=`
    <div class="es-banner fadeUp">
      <div class="es-banner-ico">🔍</div>
      <div class="es-banner-body">
        <h3>일반 검색 모드</h3>
        <p>AI 검색이 꺼져 있어 키워드 검색으로 동작합니다.<br>상단 <strong>✦ AI 검색</strong> 탭을 클릭하면 AI 요약을 볼 수 있습니다.</p>
      </div>
    </div>`;
  const s=SC[curQ];
  if(s){
    const intSrcs=s.srcs.filter(r=>!r.ext);
    renderSrcs(intSrcs);
  }
}
function enableAiFromTab(){
  aiOn = true;
  updateSboxMode();
  curTab = 'search';
  renderTabBar();
  renderContent();
}
function turnAiOn(){ enableAiFromTab(); }

function renderAiCard(main,s){
  main.innerHTML=`
    <div class="ai-card fi">
      <div class="ai-title">AI 요약</div>
      <div class="bdg ${s.masked>0?'b-mask':'b-ok'}">${s.masked>0?`🛡 ${s.masked}개 검색 항목 보안 마스킹 적용됨`:'🛡 입력 정보에 민감 항목 없음'}</div>
      <div class="phd">
        <div class="plbl" onclick="togProg()"><span id="pLbl">진행 중...</span> <span id="pTog">∧</span></div>
        <div class="rtabsr" id="rTabsEl" style="display:none"></div>
      </div>
      <div class="steps" id="stepsC" style="display:flex;flex-direction:column;gap:10px"></div>
      <div id="sumArea" style="display:none"></div>
      <div class="acts" id="actsEl" style="display:none">
        <button class="act" onclick="cpSum()" title="복사"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
        <button class="act" title="공유"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
      </div>
      <button class="fbtn" id="fBtn" style="display:none" onclick="alert('flow AI 채팅으로 이동합니다 (프로토타입)')">
        ✦ flow AI에서 자세히 탐색하기
      </button>
    </div>`;

  let t=0;
  tmr=setTimeout(()=>addStep('의도 분석','탐색 의도를 파악했어요.',[
    {lbl:'검색 조건',chips:s.cond.map(c=>({t:c,c:'ck'}))},
    {lbl:'검색 키워드',chips:s.kw.map(k=>({t:k,c:'ckw'}))},
  ],'done'),t+=400);
  tmr=setTimeout(()=>{
    const chips=[{t:`총합 ${s.stats.total}건`,c:'ckt'}];
    if(s.stats.proj)   chips.push({t:`프로젝트 ${s.stats.proj}`,c:'cp'});
    if(s.stats.post)   chips.push({t:`게시글 ${s.stats.post}`,c:'cpo'});
    if(s.stats.comment) chips.push({t:`댓글 ${s.stats.comment}`,c:'cc'});
    if(s.stats.chat)   chips.push({t:`채팅 ${s.stats.chat}`,c:'cch'});
    if(s.stats.file)   chips.push({t:`파일 ${s.stats.file}`,c:'cf'});
    if(s.stats.chatfile) chips.push({t:`채팅파일 ${s.stats.chatfile}`,c:'ccf'});
    if(s.stats.wiki)   chips.push({t:`위키 ${s.stats.wiki}`,c:'cw'});
    if(s.stats.cal)    chips.push({t:`캘린더 ${s.stats.cal}`,c:'ccal'});
    if(s.stats.email)  chips.push({t:`이메일 ${s.stats.email}`,c:'cem'});
    addStep('플로우에서 탐색',`중복 제외 후 총 ${s.stats.total}건의 결과를 정리했어요.`,[{lbl:'',chips}],'done');
  },t+=900);
  tmr=setTimeout(()=>addStep('검색 결과 확인 중','',[],'spin'),t+=600);
  tmr=setTimeout(()=>{
    finDot();
    const pLbl=document.getElementById('pLbl');
    const stepsC=document.getElementById('stepsC');
    const pTog=document.getElementById('pTog');
    const actsEl=document.getElementById('actsEl');
    const fBtn=document.getElementById('fBtn');
    if(!pLbl||!stepsC) return; // 탭 전환으로 DOM이 교체된 경우
    pLbl.textContent='작업 완료';
    stepsC.style.display='none';
    pTog.textContent='∨';
    renderSum(s.sum);
    renderSrcs(s.srcs);
    if(actsEl) actsEl.style.display='flex';
    if(fBtn) fBtn.style.display='flex';
  },t+=1300);
}

function runFail(main, failType='retry', failMsg=null){
  const defaultMsg = {
    retry:   '요청하신 검색이 너무 복잡합니다. 더 간단한 검색어로 시도해 주세요.',
    noresult:'플로우 내에 관련 정보가 없습니다. 다른 키워드로 검색해 보세요.',
    stop:    '검색 요청이 너무 광범위합니다. 더 구체적인 조건을 포함해 주세요.',
  };
  const msg = failMsg || defaultMsg[failType] || defaultMsg.retry;

  main.innerHTML=`
    <div class="ai-card fi">
      <div class="ai-title">AI 요약</div>
      <div class="bdg b-ok">🛡 입력 정보에 민감 항목 없음</div>
      <div class="phd">
        <div class="plbl" onclick="togProg()"><span id="pLbl">진행 중...</span> <span id="pTog">∧</span></div>
        <div class="rtabsr" id="rTabsEl" style="display:none"></div>
      </div>
      <div class="steps" id="stepsC" style="display:flex;flex-direction:column;gap:10px"></div>
      <div id="sumArea" style="display:none"></div>
      <div class="acts" id="actsEl" style="display:none"><button class="act" onclick="cpSum()" title="복사"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button><button class="act" title="공유"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button></div>
      <button class="fbtn" id="fBtn" style="display:none" onclick="alert('flow AI 채팅으로 이동합니다 (프로토타입)')">✦ flow AI에서 자세히 탐색하기</button>
    </div>`;

  function finish(label){
    const pLbl=document.getElementById('pLbl');
    const stepsC=document.getElementById('stepsC');
    const pTog=document.getElementById('pTog');
    const actsEl=document.getElementById('actsEl');
    const fBtn=document.getElementById('fBtn');
    if(!pLbl||!stepsC) return;
    pLbl.textContent=label;
    stepsC.style.display='none';
    pTog.textContent='∨';
    const a=document.getElementById('sumArea');
    if(a){ a.style.display='block'; a.innerHTML=`<div class="fail-msg fi">${msg}<br><span class="fail-stop">[검색이 중지되었습니다]</span></div>`; }
    if(actsEl) actsEl.style.display='flex';
    if(fBtn) fBtn.style.display='flex';
  }

  // 즉시 중지
  if(failType==='stop'){
    setTimeout(()=>addStep('의도 분석','탐색 의도를 파악했어요.',[{lbl:'검색 조건',chips:[{t:'통합 탭',c:'ck'}]},{lbl:'검색 키워드',chips:[{t:curDisplayQ,c:'ckw'}]}],'done'),300);
    setTimeout(()=>addStep('플로우에서 탐색','범위가 너무 넓어 탐색을 중단했습니다.',[{lbl:'',chips:[{t:'총합 0건',c:'ckt'}]}],'done'),1000);
    setTimeout(()=>{ finDot(); finish('검색 중지'); },1800);
    return;
  }

  // 결과 없음 (재시도 없이)
  if(failType==='noresult'){
    setTimeout(()=>addStep('의도 분석','탐색 의도를 파악했어요.',[{lbl:'검색 조건',chips:[{t:'통합 탭',c:'ck'}]},{lbl:'검색 키워드',chips:[{t:curDisplayQ,c:'ckw'}]}],'done'),300);
    setTimeout(()=>addStep('플로우에서 탐색','중복 제외 후 총 0건의 결과를 정리했어요.',[{lbl:'',chips:[{t:'총합 0건',c:'ckt'}]}],'done'),900);
    setTimeout(()=>addStep('검색 결과 확인 중','',[],'spin'),1400);
    setTimeout(()=>{ finDot(); finish('검색 중지'); },2200);
    return;
  }

  // 재시도 (기본 retry)
  function runR(i){
    const r=FAIL.retries[i];
    document.getElementById('stepsC').innerHTML='';
    const te=document.getElementById('rTabsEl');
    te.style.display='flex';
    te.innerHTML=FAIL.retries.slice(0,i+1).map((rt,j)=>`<div class="rtabr ${j===i?'on':''}">${rt.lbl} ↺</div>`).join('');
    setTimeout(()=>{i>0
      ?addStep('추가 분석',`키워드를 ${r.kw.join(', ')} 로 바꿔서 다시 탐색해요.`,[{lbl:'검색 조건',chips:r.cond.map(c=>({t:c,c:'ck'}))},{lbl:'검색 키워드',chips:r.kw.map(k=>({t:k,c:'ckw'}))}],'done')
      :addStep('의도 분석','통합 탐색 의도로 보여요.',[{lbl:'검색 조건',chips:r.cond.map(c=>({t:c,c:'ck'}))},{lbl:'검색 키워드',chips:r.kw.map(k=>({t:k,c:'ckw'}))}],'done');
    },300);
    setTimeout(()=>addStep('플로우에서 탐색','중복 제외 후 총 0건의 결과를 정리했어요.',[{lbl:'',chips:[{t:'총합 0건',c:'ckt'}]}],'done'),900);
    setTimeout(()=>addStep('검색 결과 확인 중','',[],'spin'),1400);
    setTimeout(()=>{
      finDot();
      if(i<FAIL.retries.length-1){runR(i+1);return;}
      finish('검색 중지');
    },2000);
  }
  runR(0);
}

// ─────────── Browse 모드 (카테고리 탭)
function renderBrowse(area){
  const wrap=document.createElement('div');
  wrap.className='browse-layout';

  const main=document.createElement('div');
  main.className='browse-main';

  const s=SC[curQ];
  // fail 모드는 browse 탭 비활성
  if(s && s.mode==='fail'){
    main.innerHTML=`<div style="text-align:center;padding:40px;color:var(--mut)">검색 결과가 없습니다</div>`;
    wrap.appendChild(main);
    area.appendChild(wrap);
    return;
  }
  const q=curQ;
  const hl=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  function highlight(text){
    if(!text||!hl) return text||'';
    return text.replace(new RegExp(`(${hl})`, 'gi'), '<mark>$1</mark>');
  }

  function makeGroup(title, cnt, items, plusMore=false){
    if(!items||!items.length) return '';
    // 실제 표시 건수보다 통계가 많을 때만 + 표시
    const hasMore = plusMore && cnt > items.length;
    const cntLabel = hasMore ? cnt+'+' : cnt;

    function renderItem(item){
      const matchBadge = item.type==='파일' ? (() => {
        if(item.matchType==='content') return `<span class="match-badge mb-content">내용 일치</span>`;
        if(item.matchType==='drive')   return `<span class="match-badge mb-drive">구글 드라이브</span>`;
        return `<span class="match-badge mb-name">파일명 일치</span>`;
      })() : '';
      const snippetHtml = item.snippet ? `<div class="file-snippet">… ${item.snippet} …</div>` : '';
      const driveLabel = item.matchType==='drive' ? `<span class="drive-badge">📗 구글 드라이브</span>` : '';

      // 채팅 타입 특수 렌더
      if(item.type==='채팅'){
        const colors=['#374151','#7c3aed','#059669','#b45309','#0369a1','#be185d'];
        const avatarColor = item.chatColor || colors[Math.abs(item.chatSender?.charCodeAt(0)||0) % colors.length];
        const initial = item.chatSender ? item.chatSender[0] : '?';
        return `
        <div class="chat-item" onclick="alert('채팅방으로 이동합니다 (프로토타입)')">
          <div class="chat-avatar" style="background:${avatarColor}">${initial}</div>
          <div class="chat-body">
            <div class="chat-header">
              <span class="chat-name">${item.chatSender||item.author}</span>
              <span class="chat-date">${item.date||''}</span>
              <span class="chat-room">${item.chatRoom||item.project}</span>
            </div>
            <div class="chat-msg">${item.chatMsg||highlight(item.preview)}</div>
          </div>
        </div>`;
      }

      // 할일 타입 특수 렌더
      if(item.type==='할일'){
        const priorityHtml = item.todoPriority==='high' ? '<span class="todo-priority">↑</span>' : '';
        const deadlineCls = item.todoOverdue ? 'overdue' : '';
        return `
        <div class="todo-item" onclick="alert('업무로 이동합니다 (프로토타입)')">
          <span class="todo-status ${item.todoStatusCls||'todo-s-wait'}">${item.todoStatus||'대기'}</span>
          <span class="todo-title">${item.title}</span>
          ${priorityHtml}
          <span class="todo-deadline ${deadlineCls}">${item.todoDeadline||item.date}</span>
        </div>`;
      }

      // 위키 타입 특수 렌더 (파일 첨부 / 업무 임베드)
      if(item.type==='위키'){
        const filesHtml = item.wikiFiles ? item.wikiFiles.map(f=>`
          <div style="display:flex;align-items:center;gap:8px;background:#f8f9ff;border:1px solid #e0e7ff;border-radius:8px;padding:8px 12px;margin-top:7px">
            <span style="font-size:18px">${f.icon||'📄'}</span>
            <span style="font-size:12.5px;color:var(--txt);font-weight:500;flex:1">${f.name}</span>
            <span style="font-size:11.5px;color:var(--mut)">${f.size}</span>
          </div>`).join('') : '';
        const tasksHtml = item.wikiTasks ? item.wikiTasks.map(t=>`
          <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-top:8px;background:#fff">
            <div style="background:#f5f3ff;padding:10px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e5e7eb">
              <span style="font-size:13px">≡</span>
              <span style="font-size:13px;font-weight:600;color:#3730a3">${t.title}</span>
            </div>
            <div style="padding:10px 14px">
              <table style="width:100%;font-size:12.5px;border-collapse:collapse">
                <tr><td style="color:var(--mut);padding:5px 0;width:80px">담당자</td><td style="color:var(--txt);font-weight:500">${t.assignee}</td></tr>
                <tr><td style="color:var(--mut);padding:5px 0">상태</td><td><span style="background:#ede9fe;color:#6d28d9;border-radius:12px;padding:2px 10px;font-size:11.5px;font-weight:700">● ${t.status}</span></td></tr>
                <tr><td style="color:var(--mut);padding:5px 0">마감일</td><td style="color:var(--txt)">${t.deadline} 까지</td></tr>
                <tr><td style="color:var(--mut);padding:5px 0">우선순위</td><td style="color:var(--mut)">-</td></tr>
              </table>
            </div>
            <div style="padding:7px 14px;border-top:1px solid #f3f4f6;display:flex;align-items:center;gap:5px">
              <span style="font-size:11px;color:var(--mut)">🟣 flow.team</span>
            </div>
          </div>`).join('') : '';
        const postsHtml = item.wikiPosts ? item.wikiPosts.map(p=>`
          <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-top:8px;background:#fff;padding:14px 16px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <div style="width:28px;height:28px;border-radius:50%;background:#374151;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${p.author[0]}</div>
              <span style="font-size:12.5px;font-weight:600;color:var(--txt)">${p.author}</span>
              <span style="font-size:11.5px;color:var(--mut)">${p.team}</span>
              <span style="font-size:11.5px;color:var(--mut);margin-left:auto">${p.date}</span>
            </div>
            <div style="font-size:13.5px;font-weight:700;color:var(--txt);margin-bottom:8px">${p.title}</div>
            <div style="font-size:12.5px;color:var(--sub);line-height:1.65;white-space:pre-line;display:-webkit-box;-webkit-line-clamp:4;overflow:hidden;-webkit-box-orient:vertical">${p.preview}</div>
          </div>`).join('') : '';
        const snippetHtml2 = snippetHtml;
        return `
        <div class="res-item" onclick="alert('위키 페이지로 이동합니다 (프로토타입)')">
          <div class="res-item-ico" style="background:${item.ico_bg||'#f0fdfa'}">${item.icon}</div>
          <div class="res-item-body">
            <div class="res-item-title">${item.title}</div>
            <div class="res-item-preview">${item.preview}</div>
            ${filesHtml}${tasksHtml}${postsHtml}${snippetHtml}
            <div class="res-item-meta" style="margin-top:6px">
              <span>${item.project}</span><span class="dot-sep">·</span>
              <span>${item.author}</span><span class="dot-sep">·</span>
              <span>${item.date||''}</span>
            </div>
          </div>
        </div>`;
      }

      // 캘린더 타입 특수 렌더
      if(item.type==='캘린더'){
        const attendeesHtml = item.calAttendees
          ? item.calAttendees.map(a=>`<span class="cal-attendee-chip">${a}</span>`).join('')
          : '';
        const dotColor = {'ct-meeting':'#10b981','ct-leave':'#ef4444','ct-halfday':'#f59e0b','ct-birthday':'#ec4899'}[item.calType]||'#10b981';
        return `
        <div class="cal-item" onclick="alert('캘린더로 이동합니다 (프로토타입)')">
          <div class="cal-dot" style="background:${dotColor}"></div>
          <div class="cal-body">
            <div class="cal-title">
              <span class="cal-type-badge ${item.calType||'ct-meeting'}">${item.calTypeLabel||'회의'}</span>${item.title}
            </div>
            <div class="cal-time">
              🕐 ${item.calTime||''}
              ${item.calLocation?`<span class="cal-location">📍 ${item.calLocation}</span>`:''}
            </div>
            ${attendeesHtml?`<div class="cal-attendees">👥 ${attendeesHtml}</div>`:''}
            <div class="res-item-meta" style="margin-top:5px"><span>${item.project}</span><span class="dot-sep">·</span><span>${item.date||''}</span></div>
          </div>
        </div>`;
      }

      // 업무 타입 특수 렌더
      if(item.type==='업무'){
        const statusCls = item.statusCls||'ts-wait';
        const priorityHtml = item.priority && item.priority!=='보통'
          ? `<span class="task-priority ${item.priorityCls||'tp-normal'}">${item.priority}</span>`
          : '';

        // 마감일 색상
        let deadlineColor = 'var(--mut)';
        let deadlineSuffix = '';
        if(item.deadline){
          const dl = new Date(item.deadline);
          const now = new Date();
          now.setHours(0,0,0,0); dl.setHours(0,0,0,0);
          const diff = Math.round((dl-now)/(1000*60*60*24));
          if(diff < 0){ deadlineColor='#dc2626'; deadlineSuffix=' · 지연'; }
          else if(diff === 0){ deadlineColor='#dc2626'; deadlineSuffix=' · 오늘'; }
          else if(diff === 1){ deadlineColor='#ea580c'; deadlineSuffix=' · 내일'; }
          else if(diff <= 7){ deadlineColor='#b45309'; }
        }
        const deadlineHtml = item.deadline
          ? `<span class="task-deadline" style="color:${deadlineColor};font-weight:${deadlineColor!=='var(--mut)'?'600':'400'}">마감 ${item.deadline}${deadlineSuffix}</span>`
          : '';

        const assigneeHtml = item.assignee
          ? `<span class="task-assignee-chip" onclick="applyAssigneeFilter('${item.assignee.split(' ')[0]}',event)" title="담당자 필터 적용">👤 ${item.assignee}</span>`
          : '';

        return `
        <div class="res-item" onclick="alert('업무로 이동합니다 (프로토타입)')">
          <div class="res-item-ico" style="background:${item.ico_bg||'#eff6ff'}">${item.icon}</div>
          <div class="res-item-body">
            <div class="res-item-title">${highlight(item.title||'')}</div>
            <div class="task-meta" style="margin-bottom:4px">
              <span class="task-status ${statusCls} task-status-clickable" onclick="applyStatusFilter('${item.status||'대기'}',event)" title="이 상태로 필터">${item.status||'대기'}</span>
              ${priorityHtml}
            </div>
            <div class="res-item-meta" style="gap:6px">
              ${assigneeHtml}
              ${assigneeHtml&&deadlineHtml?`<span class="dot-sep">·</span>`:''}
              ${deadlineHtml}
              ${(assigneeHtml||deadlineHtml)&&item.project?`<span class="dot-sep">·</span>`:''}
              ${item.project?`<span>${item.project}</span>`:''}
            </div>
          </div>
        </div>`;
      }

      // 히스토리 타입 특수 렌더
      if(item.type==='히스토리'){
        const fromCls = {'요청':'ts-wait','대기':'ts-wait','진행':'ts-progress','완료':'ts-done','테스트':'ts-test','피드백':'ts-hold'}[item.historyFrom]||'ts-wait';
        const toCls   = {'요청':'ts-wait','대기':'ts-wait','진행':'ts-progress','완료':'ts-done','테스트':'ts-test','피드백':'ts-hold'}[item.historyTo]||'ts-wait';
        return `
        <div class="history-item" onclick="alert('업무로 이동합니다 (프로토타입)')">
          <div class="res-item-ico" style="background:#f5f3ff">${item.icon}</div>
          <div class="res-item-body">
            <div class="res-item-title">${item.title}</div>
            <div class="history-line">
              <span class="task-status ${fromCls}">${item.historyFrom}</span>
              <span class="h-arrow">→</span>
              <span class="task-status ${toCls}">${item.historyTo}</span>
              <span class="h-who">${item.historyWho} · ${item.historyAt}</span>
            </div>
            <div class="res-item-meta"><span>${item.project}</span></div>
          </div>
        </div>`;
      }

      // 투표 타입 특수 렌더
      if(item.type==='투표' && item.voteItems){
        const barsHtml = item.voteItems.map(([l,p])=>`
          <div class="vote-bar-row">
            <span class="vote-bar-label">${l}</span>
            <div class="vote-bar-bg"><div class="vote-bar-fill" style="width:${p}%"></div></div>
            <span class="vote-bar-pct">${p}%</span>
          </div>`).join('');
        return `
        <div class="res-item" onclick="alert('투표 게시물로 이동합니다 (프로토타입)')">
          <div class="res-item-ico" style="background:#faf5ff">${item.icon}</div>
          <div class="res-item-body">
            <div class="res-item-title">${item.title}</div>
            <div class="inline-vote">
              <div class="inline-vote-title">🗳 투표 결과 · 참여 ${item.voteTotal}명</div>
              <div class="vote-bar-wrap">${barsHtml}</div>
            </div>
            <div class="res-item-meta" style="margin-top:6px">
              ${item.project?`<span>${item.project}</span><span class="dot-sep">·</span>`:''}
              <span>${item.author}</span><span class="dot-sep">·</span><span>${item.date||''}</span>
            </div>
          </div>
        </div>`;
      }

      // 일반 렌더 — flow 실제 검색 UI 형태
      const typeIcons = {'글':'≡','업무':'≡','일정':'📅','투표':'🗳','할일':'☑','파일':'📄','채팅':'○','프로젝트':'🗂️','위키':'📖','캘린더':'📅','히스토리':'🕐'};
      const typeIcon = typeIcons[item.type] || '≡';

      return `
      <div class="res-item" onclick="alert('원본으로 이동합니다 (프로토타입)')">
        <div class="res-item-ico">${typeIcon}</div>
        <div class="res-item-body">
          <div class="res-item-title">${highlight(item.title||'')}${matchBadge}${driveLabel}</div>
          <div class="res-item-preview">${highlight(item.preview||'')}</div>
          ${snippetHtml}
          <div class="res-item-meta">
            ${item.author?`<span>${item.author}</span><span class="pipe">|</span>`:''}
            ${item.date?`<span>${item.date||''}</span><span class="pipe">|</span>`:''}
            ${item.type?`<span class="type-badge">${item.type}</span>`:''}
            ${item.project?`<span class="pipe">|</span><span>${item.project}</span>`:''}
          </div>
        </div>
      </div>`;
    }

    return `
      <div class="res-group fadeUp">
        <div class="res-group-hd">
          <span class="res-group-title">${title}</span>
          <span class="res-group-cnt">${cntLabel}</span>
          ${hasMore?`<span class="res-more">더보기 →</span>`:''}
        </div>
        ${items.map(item=>renderItem(item)).join('')}
      </div>`;
  }

  let html='';
  const br=s&&s.browse?s.browse:{};

  if(curTab==='all'){
    if(br.proj&&br.proj.length) html+=makeGroup('프로젝트',br.proj.length,br.proj);
    if(br.post&&br.post.length) html+=makeGroup('게시물',(s&&s.stats&&s.stats.post||br.post.length),br.post,s&&s.stats&&s.stats.post>br.post.length);
    if(br.cal&&br.cal.length)   html+=makeGroup('캘린더',(s&&s.stats&&s.stats.cal||br.cal.length),br.cal);
    if(br.chat&&br.chat.length) html+=makeGroup('채팅',(s&&s.stats&&s.stats.chat||br.chat.length),br.chat);
    if(br.file&&br.file.length) html+=makeGroup('파일',(s&&s.stats&&s.stats.file||br.file.length),br.file);
    if(br.wiki&&br.wiki.length) html+=makeGroup('위키',(s&&s.stats&&s.stats.wiki||br.wiki.length),br.wiki);
    if(!html) html=`<div style="text-align:center;padding:40px;color:var(--mut);font-size:14px">검색 결과가 없습니다</div>`;
  } else if(curTab==='proj'){
    html = makeGroup('프로젝트',br.proj&&br.proj.length||0,br.proj)||`<div style="text-align:center;padding:40px;color:var(--mut)">프로젝트 결과가 없습니다</div>`;
  } else if(curTab==='post'){
    const hasMore = s&&s.stats&&s.stats.post > (br.post&&br.post.length||0);
    html = makeGroup('게시물',s&&s.stats&&s.stats.post||0,br.post,hasMore)||`<div style="text-align:center;padding:40px;color:var(--mut)">게시물 결과가 없습니다</div>`;
  } else if(curTab==='chat'){
    html = makeGroup('채팅',s&&s.stats&&s.stats.chat||0,br.chat)||`<div style="text-align:center;padding:40px;color:var(--mut)">채팅 결과가 없습니다</div>`;
  } else if(curTab==='file'){
    html = makeGroup('파일',s&&s.stats&&s.stats.file||0,br.file)||`<div style="text-align:center;padding:40px;color:var(--mut)">파일 결과가 없습니다</div>`;
  } else if(curTab==='noti'){
    const notiItems = br.noti && br.noti.length ? br.noti : [
      {icon:'🔔',title:`"${curDisplayQ}" 관련 게시물에 댓글이 달렸습니다`,preview:'우성호님이 댓글을 남겼습니다.',project:'온트너 앱 개발 프로젝트',date:"'26.03.25"},
      {icon:'🔔',title:`"${curDisplayQ}" 업무가 완료 처리되었습니다`,preview:'박서연님이 상태를 완료로 변경했습니다.',project:'삼성화재 프로젝트',date:"'26.03.22"},
      {icon:'🔔',title:`"${curDisplayQ}" 파일이 업로드되었습니다`,preview:'이지현님이 새 파일을 첨부했습니다.',project:'현대자동차 프로젝트',date:"'26.03.20"},
    ];
    html = `
      <div class="res-group fadeUp">
        <div class="res-group-hd">
          <span class="res-group-title">알림</span>
          <span class="res-group-cnt">${notiItems.length}</span>
        </div>
        ${notiItems.map(n=>`
          <div class="res-item" onclick="alert('알림으로 이동합니다 (프로토타입)')">
            <div class="res-item-ico" style="background:#fff9c3">${n.icon}</div>
            <div class="res-item-body">
              <div class="res-item-title">${n.title}</div>
              <div class="res-item-preview">${n.preview}</div>
              <div class="res-item-meta"><span>${n.project}</span><span class="pipe">|</span><span>${n.author||''}</span><span class="pipe">|</span><span>${n.date}</span></div>
            </div>
          </div>`).join('')}
      </div>`;
  } else {
    html=`<div style="text-align:center;padding:40px;color:var(--mut)">해당 카테고리 결과가 없습니다</div>`;
  }

  main.innerHTML=html;

  // 필터 패널
  const filter=document.createElement('div');
  filter.className='filter-panel';
  filter.innerHTML=`
    <div class="flow-ai-card" onclick="switchTab('search')">
      <span class="flow-ai-label">flow AI</span>
      <span class="flow-ai-arrow">→</span>
    </div>
    <div class="filter-box">
      <div class="filter-hd">
        <span class="filter-title">검색 필터</span>
        <button class="filter-reset" onclick="resetFilters()">초기화 ↺</button>
      </div>
      <div class="filter-section">
        <div class="filter-label">↕ 정렬 순서</div>
        <div class="filter-chips" id="sortChips">
          ${SORT_OPTS.map(o=>`<button class="f-chip ${curSort===o?'on':''}" onclick="setSort('${o}',this)">${o}</button>`).join('')}
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-label">📅 검색 기간</div>
        <div class="filter-chips" id="periodChips">
          ${PERIOD_OPTS.map(o=>`<button class="f-chip ${curPeriod===o?'on':''}" onclick="setPeriod('${o}',this)">${o}</button>`).join('')}
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-label">👤 ${curTab==='proj'?'참여자':'작성자'}</div>
        <input class="filter-input" placeholder="${curTab==='proj'?'참여자':'작성자'} 찾기" />
      </div>
      ${curTab!=='proj'?`
      <div class="filter-section">
        <div class="filter-label">📁 프로젝트</div>
        <input class="filter-input" placeholder="프로젝트 찾기" />
      </div>`:''}
      ${curTab==='post'?`
      <div class="filter-section">
        <div class="filter-label">📋 게시물 유형</div>
        <div class="filter-chips" id="postTypeChips">
          ${['전체','글','업무','일정','투표','할일'].map(t=>`<button class="f-chip ${curPostType===t?'on':''}" onclick="setPostType('${t}',this)">${t}</button>`).join('')}
        </div>
        <div id="subFilterArea"></div>
      </div>`:''}
    </div>`;

  wrap.appendChild(main);
  wrap.appendChild(filter);
  area.appendChild(wrap);
}

function applyStatusFilter(status, e){
  e.stopPropagation();
  // 게시물 유형 → 업무로 전환
  const postTypeChips = document.querySelectorAll('#postTypeChips .f-chip');
  postTypeChips.forEach(c=>c.classList.toggle('on', c.textContent==='업무'));
  if(document.getElementById('subFilterArea') && curPostType!=='업무'){
    curPostType='업무';
    renderSubFilter('업무');
  }
  // 해당 상태 칩 ON
  setTimeout(()=>{
    document.querySelectorAll('.sf-chip').forEach(c=>{
      if(c.textContent===status) c.classList.add('on');
    });
    const sf = document.querySelector('.sub-filter-box');
    if(sf) sf.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 50);
}
function applyAssigneeFilter(name, e){
  e.stopPropagation();
  const postTypeChips = document.querySelectorAll('#postTypeChips .f-chip');
  postTypeChips.forEach(c=>c.classList.toggle('on', c.textContent==='업무'));
  if(curPostType!=='업무'){
    curPostType='업무';
    renderSubFilter('업무');
  }
  // 담당자 칩 ON
  setTimeout(()=>{
    document.querySelectorAll('.sf-chip-person').forEach(c=>{
      c.classList.toggle('on', c.dataset.name===name);
    });
    const sf = document.querySelector('.sub-filter-box');
    if(sf) sf.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 50);
}
function setPostType(v,el){
  curPostType=v;
  document.querySelectorAll('#postTypeChips .f-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderSubFilter(v);
}
function renderSubFilter(type){
  const area = document.getElementById('subFilterArea');
  if(!area) return;
  if(type==='업무'){
    // 현재 검색 결과에서 담당자 추출
    const s = SC[curQ];
    const persons = s&&s.browse&&s.browse.post
      ? [...new Set(s.browse.post.filter(i=>i.type==='업무'&&i.assignee).map(i=>i.assignee.split(' ')[0]))]
      : ['우성호','박제원','서동석','신주경'];
    const personChips = persons.map(n=>`
      <button class="sf-chip sf-chip-person" data-name="${n}" onclick="this.classList.toggle('on');event.stopPropagation()">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#6d28d9;color:#fff;font-size:9px;font-weight:700;margin-right:4px">${n[0]}</span>${n}
      </button>`).join('');
    area.innerHTML=`
      <div class="sub-filter-box">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span class="sub-filter-title" style="margin-bottom:0">⚙️ 업무 세부 필터</span>
          <button onclick="resetSubFilter()" style="font-size:11px;color:var(--mut);background:none;border:none;cursor:pointer;font-family:inherit">초기화 ↺</button>
        </div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin-bottom:6px;font-weight:600">상태</div>
        <div class="sub-filter-chips" id="sfStatusChips">
          ${['전체','요청','진행','완료','보류','테스트'].map(s=>`<button class="sf-chip" onclick="selSfStatus('${s}',this)">${s}</button>`).join('')}
        </div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin:10px 0 6px;font-weight:600">담당자</div>
        <div class="sub-filter-chips" style="gap:5px">
          ${personChips}
        </div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin:10px 0 6px;font-weight:600">마감일</div>
        <div class="sub-filter-chips" id="sfDeadlineChips">
          ${['전체','오늘 마감','이번 주','지연됨'].map(s=>`<button class="sf-chip" onclick="selSfChip(this)">${s}</button>`).join('')}
        </div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin:10px 0 6px;font-weight:600">커스텀 컬럼</div>
        <input class="sub-filter-input" placeholder="컬럼명 또는 값 입력" />
      </div>`;
  } else if(type==='일정'){
    area.innerHTML=`
      <div class="sub-filter-box">
        <div class="sub-filter-title">📅 일정 세부 필터</div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin-bottom:5px;font-weight:600">일정 기간</div>
        <div class="sub-filter-chips">
          ${['전체','오늘','이번 주','이번 달','직접설정'].map(s=>`<button class="sf-chip" onclick="selSfChip(this)">${s}</button>`).join('')}
        </div>
        <div class="sub-filter-label" style="font-size:11px;color:var(--mut);margin:8px 0 5px;font-weight:600">참석자</div>
        <input class="sub-filter-input" placeholder="참석자 이름 검색" />
      </div>`;
  } else if(type==='투표'){
    area.innerHTML=`
      <div class="sub-filter-box">
        <div class="sub-filter-title">🗳 투표 결과 조회</div>
        <div style="font-size:12px;color:var(--sub);margin-bottom:10px">투표 항목별 득표율을 확인합니다</div>
        <div class="vote-bar-wrap">
          ${[['찬성',72],['반대',18],['보류',10]].map(([l,p])=>`
            <div class="vote-bar-row">
              <span class="vote-bar-label">${l}</span>
              <div class="vote-bar-bg"><div class="vote-bar-fill" style="width:${p}%"></div></div>
              <span class="vote-bar-pct">${p}%</span>
            </div>`).join('')}
        </div>
      </div>`;
  } else if(type==='할일'){
    area.innerHTML=`
      <div class="sub-filter-box">
        <div class="sub-filter-title">✅ 할일 필터</div>
        <div class="sub-filter-chips">
          ${['전체','미완료','완료','내 할일'].map(s=>`<button class="sf-chip" onclick="selSfChip(this)">${s}</button>`).join('')}
        </div>
      </div>`;
  } else {
    area.innerHTML='';
  }
}
function selSfStatus(v,el){
  document.querySelectorAll('#sfStatusChips .sf-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function resetSubFilter(){
  document.querySelectorAll('.sub-filter-box .sf-chip').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.sub-filter-box .sub-filter-input').forEach(i=>i.value='');
}
function selSfChip(el){
  // 같은 sub-filter-chips 내 단일 선택
  el.closest('.sub-filter-chips').querySelectorAll('.sf-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function toggleTaskStatus(v,el){
  el.classList.toggle('on');
}
function setSort(v,el){
  curSort=v;
  document.querySelectorAll('#sortChips .f-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function setPeriod(v,el){
  curPeriod=v;
  document.querySelectorAll('#periodChips .f-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function resetFilters(){
  curSort='관련도순'; curPeriod='전체'; curPostType='전체';
  document.querySelectorAll('#sortChips .f-chip').forEach(c=>c.classList.toggle('on',c.textContent==='관련도순'));
  document.querySelectorAll('#periodChips .f-chip').forEach(c=>c.classList.toggle('on',c.textContent==='전체'));
  document.querySelectorAll('#postTypeChips .f-chip').forEach(c=>c.classList.toggle('on',c.textContent==='전체'));
  const sa=document.getElementById('subFilterArea'); if(sa) sa.innerHTML='';
  document.querySelectorAll('.filter-input').forEach(i=>i.value='');
}

// ═══════════════════════════════════════════ HELPERS
function togProg(){
  const sc=document.getElementById('stepsC');
  const tog=document.getElementById('pTog');
  if(!sc||!tog) return;
  const open=sc.style.display!=='none';
  sc.style.display=open?'none':'flex';
  tog.textContent=open?'∨':'∧';
}
function cpSum(){
  const el=document.getElementById('sumArea');
  if(el) navigator.clipboard.writeText(el.innerText).then(()=>alert('복사되었습니다.')).catch(()=>alert('복사 완료'));
}
function finDot(){const d=document.querySelectorAll('.dot');if(d.length)d[d.length-1].className='dot d-done';}
function addStep(title,desc,groups,state){
  const c=document.getElementById('stepsC');if(!c)return;
  const el=document.createElement('div');el.className='step fi';
  const dc=state==='done'?'dot d-done':state==='spin'?'dot d-spin':'dot d-wait';
  const gh=groups.map(g=>`${g.lbl?`<div class="fr"><span>${g.lbl==='검색 키워드'?'🔍':'≡'}</span> ${g.lbl}</div>`:''}<div class="chips">${g.chips.map(ch=>`<span class="chip ${ch.c}">${ch.t}</span>`).join('')}</div>`).join('');
  el.innerHTML=`<div class="${dc}"></div><div class="sc"><div class="st">${title}</div>${desc?`<div class="sd">${desc}</div>`:''}${gh}</div>`;
  c.appendChild(el);
}
function renderSum(text){
  const a=document.getElementById('sumArea');if(!a)return;
  a.style.display='block';
  let icIdx=0;
  const html=text.split('\n').map(l=>{
    if(!l.trim()) return '<br>';
    // <ic> 태그를 문장 텍스트와 분리
    const icPattern=/<ic>(.*?)<\/ic>/g;
    let chips=[];
    let sentenceText = l.replace(icPattern,(_, content)=>{
      const idx=icIdx++;
      chips.push(`<span class="ic" data-src="${idx}" onclick="matchSrc(${idx},this)">${content}</span>`);
      return ''; // 문장에서 ic 제거
    }).trim();
    // 문장 끝 마침표 정리
    sentenceText = sentenceText.replace(/\.\s*$/, '') + (sentenceText.match(/\.$/) ? '' : '');
    const chipsHtml = chips.join(' ');
    return `<p><span class="line-inner">${sentenceText}</span>${chipsHtml ? ' '+chipsHtml : ''}</p>`;
  }).join('');
  a.innerHTML=`<div class="sumbody fi">${html}</div>`;
}
function matchSrc(idx, chip){
  document.querySelectorAll('.ic').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.line-inner').forEach(s=>s.classList.remove('line-highlight'));
  document.querySelectorAll('.src-card').forEach(c=>c.classList.remove('matched'));

  chip.classList.add('active');

  const parentP = chip.closest('p');
  if(parentP){
    const lineInner = parentP.querySelector('.line-inner');
    if(lineInner) lineInner.classList.add('line-highlight');
  }

  const cards = document.querySelectorAll('#srcC .src-card');
  const target = cards[idx];
  if(target){
    target.classList.add('matched');
    target.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function matchFromCard(idx, card){
  // 모든 선택 초기화
  document.querySelectorAll('.ic').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.line-inner').forEach(s=>s.classList.remove('line-highlight'));
  document.querySelectorAll('.src-card').forEach(c=>c.classList.remove('matched'));

  // 카드 하이라이트
  card.classList.add('matched');

  // 대응하는 좌측 ic 칩 찾기 (data-src === idx)
  const chip = document.querySelector(`.ic[data-src="${idx}"]`);
  if(chip){
    chip.classList.add('active');
    const parentP = chip.closest('p');
    if(parentP){
      const lineInner = parentP.querySelector('.line-inner');
      if(lineInner){
        lineInner.classList.add('line-highlight');
        lineInner.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    }
  }
}

function renderSrcs(srcs){
  const hd=document.getElementById('srcHd');
  const ct=document.getElementById('srcC');
  if(!hd||!ct) return;
  hd.textContent=`출처 (${srcs.length})`;
  if(!srcs.length){ct.innerHTML='<div class="src-empty"><div style="font-size:32px;opacity:.25;margin-bottom:7px">📄</div><div style="font-size:12.5px;color:var(--mut)">검색 결과가 표시됩니다</div></div>';return;}
  ct.innerHTML=srcs.map((s,i)=>{
    // 업무 타입 전용 카드
    if(s.lbl==='업무' && s.status){
      let dlColor='var(--mut)', dlSuffix='';
      if(s.deadline){
        const dl=new Date(s.deadline), now=new Date();
        now.setHours(0,0,0,0); dl.setHours(0,0,0,0);
        const diff=Math.round((dl-now)/(1000*60*60*24));
        if(diff<0){dlColor='#dc2626';dlSuffix=' · 지연';}
        else if(diff===0){dlColor='#dc2626';dlSuffix=' · 오늘';}
        else if(diff===1){dlColor='#ea580c';dlSuffix=' · 내일';}
        else if(diff<=7){dlColor='#b45309';}
      }
      const dlHtml = s.deadline
        ? `<span style="font-size:11.5px;color:${dlColor};font-weight:${dlColor!=='var(--mut)'?'600':'400'}">마감 ${s.deadline}${dlSuffix}</span>`
        : '';
      const sBg={'ts-done':'#f3f4f6','ts-progress':'#dcfce7','ts-test':'#fef3c7','ts-wait':'#eff6ff','ts-hold':'#fdf2f8'};
      const sFg={'ts-done':'#6b7280','ts-progress':'#16a34a','ts-test':'#92400e','ts-wait':'#2563eb','ts-hold':'#9d174d'};
      const sCls=s.statusCls||'ts-wait';
      return `
      <div class="src-card fi" data-idx="${i}" onclick="matchFromCard(${i},this)">
        <div class="src-meta">
          <span style="font-size:13px">${s.icon}</span>
          <span class="src-badge ${s.cls}">${s.lbl}</span>
          <span class="src-proj">${s.proj}</span>
          <span class="src-date">${s.date}</span>
        </div>
        <div class="src-title">${s.title}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:7px;flex-wrap:wrap">
          <span style="font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:10px;background:${sBg[sCls]||'#f3f4f6'};color:${sFg[sCls]||'#6b7280'}">● ${s.status}</span>
          ${s.assignee?`<span style="font-size:11.5px;color:var(--sub)">👤 ${s.assignee}</span>`:''}
          ${dlHtml}
        </div>
        <div class="src-dest d-int" style="margin-top:8px"> → ${s.dest}</div>
      </div>`;
    }
    // 기본 카드
    return `
    <div class="src-card fi ${s.ext?'ext':''}" data-idx="${i}" onclick="matchFromCard(${i},this)">
      <div class="src-meta">
        <span style="font-size:13px">${s.icon}</span>
        <span class="src-badge ${s.cls}">${s.lbl}</span>
        <span class="src-proj">${s.proj}</span>
        <span class="src-date">${s.date}</span>
      </div>
      <div class="src-title">${s.title}</div>
      <div class="src-prev">${s.prev||''}</div>
      <div class="src-author">${s.author}</div>
      <div class="src-dest ${s.ext?'d-ext':'d-int'}">${s.ext?'✦':' →'} ${s.dest}</div>
    </div>`;
  }).join('');
}
</script>
