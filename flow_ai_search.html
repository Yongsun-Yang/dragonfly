<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flow · 통합 AI 검색 프로토타입</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f4f7;--sur:#fff;
  --pri:#4f46e5;--pri-l:#ede9fe;--pri-b:#c4b5fd;
  --txt:#111827;--sub:#6b7280;--mut:#9ca3af;--bdr:#e5e7eb;
  --hd:#1a1a2e;--cyan:#06b6d4;--pink:#ec4899;
  --ai:#6d28d9;--ai-l:#f5f3ff;--ai-b:#ddd6fe;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}

/* ──────────────────────────────── HEADER */
.hd{background:var(--hd);height:56px;padding:0 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.logo{color:#fff;font-weight:700;font-size:18px;letter-spacing:-.5px}
.sw{flex:1;max-width:600px;position:relative}
.sbox{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:24px;display:flex;align-items:center;gap:8px;padding:0 16px;height:38px;cursor:pointer;transition:all .2s}
.sbox:hover,.sbox.open{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.35)}
.sbox-mode{display:flex;align-items:center;gap:4px;background:rgba(109,40,217,.35);border-radius:12px;padding:2px 9px;font-size:11.5px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;flex-shrink:0;transition:all .3s}
.sbox-mode.off{background:rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
.sbox-ph{color:rgba(255,255,255,.4);font-size:13.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbox-ph.has-val{color:rgba(255,255,255,.85)}
.sbox-sk{color:rgba(255,255,255,.2);font-size:11px;white-space:nowrap;flex-shrink:0}
.hd-icons{margin-left:auto;display:flex;gap:16px;color:rgba(255,255,255,.45);font-size:13px}

/* ──────────────────────────────── DROPDOWN */
.dd{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:600px;background:var(--sur);border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.18);z-index:300;overflow:hidden;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.dd-top{padding:18px 18px 0}
.dd-inp-row{display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--bdr)}
.dd-inp{flex:1;border:none;outline:none;font-size:15.5px;font-family:inherit;color:var(--txt);background:none}
.dd-inp::placeholder{color:var(--mut)}
.dd-inp-clear{color:var(--mut);cursor:pointer;font-size:18px;background:none;border:none;padding:0 2px;border-radius:50%;transition:all .15s;flex-shrink:0;line-height:1}
.dd-inp-clear:hover{background:var(--bg);color:var(--sub)}
.dd-tabs-wrap{padding:10px 0 4px}
.dd-row{display:flex;align-items:center;gap:6px;padding-bottom:7px;flex-wrap:nowrap;overflow-x:auto}
.dd-row::-webkit-scrollbar{display:none}

/* AI 검색 태그 */
.t-ai-on{display:inline-flex;align-items:center;gap:5px;background:var(--ai-l);border:1.5px solid var(--ai-b);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ai);white-space:nowrap;flex-shrink:0;user-select:none;cursor:pointer;transition:all .15s}
.t-ai-on:hover{background:#ede9fe;border-color:#a78bfa}
.t-ai-on .ai-x{font-size:14px;opacity:.5;margin-left:1px;line-height:1;transition:opacity .15s}
.t-ai-on:hover .ai-x{opacity:.85}
.t-ai-off{display:inline-flex;align-items:center;gap:5px;background:#f3f4f6;border:1.5px solid #e5e7eb;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.t-ai-off:hover{background:var(--ai-l);border-color:var(--ai-b);color:var(--ai)}

/* 외부 연동 탭 */
.t-ext{display:inline-flex;align-items:center;gap:4px;background:var(--ai-l);border:1px solid var(--ai-b);border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:500;color:var(--ai);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;position:relative}
.t-ext:hover{background:#ede9fe}
.t-ext.on{background:var(--ai);color:#fff;border-color:var(--ai);font-weight:600}
.t-ext-dis{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px dashed #d1d5db;border-radius:20px;padding:6px 12px;font-size:12.5px;color:#d1d5db;cursor:pointer;white-space:nowrap;flex-shrink:0;position:relative;transition:border-color .15s,color .15s}
.t-ext-dis:hover{border-color:#c4b5fd;color:#c4b5fd}

/* 일반 탭 */
.t-reg{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:500;color:var(--sub);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;flex-direction:column;line-height:1.2}
.t-reg:hover{background:#f3f4f6;color:var(--txt)}
.t-reg.on{background:var(--pri-l);color:var(--pri);border-color:var(--pri);font-weight:600}
.t-reg-main{display:flex;align-items:center;gap:4px}
.t-reg-hint{font-size:9.5px;color:#b0b8c8;font-weight:400;margin-top:1px}
.t-reg.on .t-reg-hint{color:#a5b4fc}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.shake{animation:shake .3s ease}

/* Tooltip */
.tt{position:relative}
.tt-tip{position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:11.5px;padding:5px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.tt-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1f2937}
.tt:hover .tt-tip{opacity:1}

/* Recent */
.dd-rec{padding:12px 18px 6px}
.dd-rec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.dd-rec-ttl{font-size:13px;font-weight:600}
.dd-rec-clr{font-size:12px;color:var(--mut);cursor:pointer;background:none;border:none;font-family:inherit}
.dd-rec-clr:hover{color:var(--sub)}
.rec-item{display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer;border-radius:8px;transition:background .12s}
.rec-item:hover{background:var(--bg)}
.rec-ico{color:var(--mut);font-size:14px;flex-shrink:0}
.rec-txt{flex:1;font-size:13.5px;color:var(--sub)}
.rec-date{font-size:12px;color:var(--mut)}
.rec-del{color:var(--mut);cursor:pointer;opacity:0;font-size:15px;background:none;border:none;padding:0 3px}
.rec-item:hover .rec-del{opacity:1}
.dd-sc{text-align:center;padding:10px 18px 14px;font-size:12px;color:var(--mut);border-top:1px solid var(--bdr);margin-top:6px}

/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:150;display:none}
.ov.on{display:block}

/* ──────────────────────────────── PAGE */
.page{max-width:1280px;margin:0 auto;padding:0 24px}

/* EMPTY */
.empty{padding:40px 0 60px;max-width:1000px;margin:0 auto}
.empty-logo{font-size:28px;font-weight:800;color:var(--pri);opacity:.12;letter-spacing:-1px;text-align:center;margin-bottom:6px}
.empty-hint{font-size:14px;color:var(--mut);text-align:center;line-height:1.7;margin-bottom:32px}

/* 데모 그룹 그리드 */
.demo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.demo-grid-bottom{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.demo-group{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px}
.demo-group-title{font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.demo-btn{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--bdr);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:6px}
.demo-btn:last-child{margin-bottom:0}
.demo-btn:hover{background:var(--pri-l);border-color:var(--pri);color:var(--pri)}
.demo-btn.ai{background:var(--ai-l);border-color:var(--ai-b);color:var(--ai)}
.demo-btn.ai:hover{background:#ede9fe;border-color:#a78bfa}
.demo-btn.fail{background:#fff5f5;border-color:#fee2e2;color:#b91c1c}
.num-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--pri);color:#fff;font-size:11px;font-weight:800;border-radius:4px;padding:1px 5px;margin-left:5px;letter-spacing:0;vertical-align:middle;flex-shrink:0}
.num-badge-sm{display:inline-flex;align-items:center;justify-content:center;background:var(--pri-l);color:var(--pri);font-size:11px;font-weight:800;border-radius:4px;padding:1px 6px;margin-left:4px;letter-spacing:0;vertical-align:middle}
.demo-btn.fail:hover{background:#fee2e2}

/* ──────────────────────────────── RESULT HEADER */
.rh{padding:14px 0 10px;display:flex;align-items:center;gap:10px}
.back{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--sub);cursor:pointer;font-family:inherit;transition:background .15s;flex-shrink:0}
.back:hover{background:#f9fafb}
.rtit{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtit em{color:var(--pri);font-style:normal}

/* ──────────────────────────────── RESULT TAB BAR */
.rtabs{display:flex;align-items:center;gap:4px;padding:0 0 14px;flex-wrap:nowrap;overflow-x:auto}
.rtabs::-webkit-scrollbar{display:none}
.rt-search{display:flex;align-items:center;gap:5px;background:var(--hd);color:#fff;border:none;border-radius:24px;padding:7px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.rt-search:hover{opacity:.85}
.rt-search.mode-browse{background:#374151}
.rtdiv{width:1px;height:22px;background:var(--bdr);margin:0 4px;flex-shrink:0}
.rt{display:flex;align-items:center;gap:4px;background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:12.5px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;flex-shrink:0}
.rt:hover{background:#f9fafb;color:var(--txt)}
.rt.on{background:#1f2937;border-color:#1f2937;color:#fff;font-weight:600}
.rt-cnt{font-size:11px;opacity:.7;margin-left:1px}

/* ──────────────────────────────── AI RESULT LAYOUT */
.ai-layout{display:flex;gap:20px;align-items:flex-start;padding-bottom:40px}
.ai-main{flex:1;min-width:0}
.ai-card{background:var(--sur);border-radius:16px;padding:24px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:2px;background:linear-gradient(135deg,var(--cyan),var(--pri),var(--pink));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.ai-title{font-size:17px;font-weight:700;margin-bottom:14px}
.bdg{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;margin-bottom:14px;border:1px solid}
.b-ok{background:#f0fdf4;border-color:#bbf7d0;color:#16a34a}
.b-mask{background:#eff6ff;border-color:#bfdbfe;color:#2563eb}
.phd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plbl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;user-select:none}
.rtabsr{display:flex;gap:6px}
.rtabr{font-size:11px;font-weight:600;color:var(--mut);cursor:pointer;padding:2px 0;border-bottom:2px solid transparent}
.rtabr.on{color:var(--pri);border-color:var(--pri)}
.steps{display:flex;flex-direction:column;gap:10px;padding-left:2px}
.step{display:flex;gap:12px;align-items:flex-start}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.d-done{background:#4ade80}.d-spin{background:var(--pri);animation:pu 1s infinite}.d-wait{background:#d1d5db}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sc{flex:1;min-width:0}
.st{font-size:13px;font-weight:600;margin-bottom:3px}
.sd{font-size:12px;color:var(--mut);margin-bottom:5px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.chip{display:inline-flex;align-items:center;border-radius:6px;padding:3px 9px;font-size:11.5px;font-weight:500;border:1px solid transparent}
.ck{background:#f3f4f6;color:var(--sub);border-color:#e5e7eb}
.ckw{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.ckt{background:#f3f4f6;color:var(--txt)}
.cp{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.cpo{background:#f3f4f6;color:var(--sub);border-color:#e5e7eb}
.cc{background:#fefce8;color:#ca8a04;border-color:#fde68a}
.cch{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.cf{background:#fdf4ff;color:#9333ea;border-color:#e9d5ff}
.ccf{background:#fff7ed;color:#ea580c;border-color:#fed7aa}
.cw{background:#f0fdfa;color:#0d9488;border-color:#99f6e4}
.ccal{background:#fff1f2;color:#be123c;border-color:#fecdd3}
.cem{background:#faf5ff;color:#7c3aed;border-color:#e9d5ff}
.fr{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--mut);margin-bottom:3px}
.sumbody{font-size:14px;line-height:1.8;color:var(--txt);border-top:1px solid var(--bdr);padding-top:14px;margin-top:2px}
.sumbody p{margin-bottom:9px}
.ic{display:inline-flex;align-items:center;background:#f0f0f0;border:1px solid transparent;border-radius:4px;padding:1px 7px;font-size:11px;color:#6b7280;font-weight:500;cursor:pointer;vertical-align:middle;margin:0 3px;transition:all .15s}
.ic:hover{background:#e5e5e5;color:#374151}
.ic.active{background:#ede9fe;border-color:#a78bfa;color:var(--ai);font-weight:600}
.line-inner{display:inline}
.line-inner.line-highlight{background:#f5f3ff;border-radius:5px;padding:2px 6px}
@keyframes cardPulse{0%{box-shadow:0 0 0 0 rgba(109,40,217,.4)}70%{box-shadow:0 0 0 6px rgba(109,40,217,0)}100%{box-shadow:0 0 0 0 rgba(109,40,217,0)}}
.src-card.matched{border-color:var(--ai)!important;background:#faf5ff!important;box-shadow:0 0 0 3px rgba(109,40,217,.12)!important;animation:cardPulse .5s ease}
.src-card.matched .src-title{color:var(--ai)}
.src-card.matched .src-dest{color:var(--ai);font-weight:600}
.fail-msg{border-top:1px solid var(--bdr);padding-top:14px;margin-top:2px;font-size:14px;color:var(--sub);line-height:1.8}
.fail-stop{font-style:italic;color:var(--mut);font-size:13px}
.acts{display:flex;align-items:center;gap:6px;margin-top:14px;border-top:1px solid var(--bdr);padding-top:14px}
.act{display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--bdr);border-radius:7px;padding:6px 8px;font-size:16px;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .15s;width:34px;height:34px}
.act:hover{background:#f9fafb;color:var(--txt)}
.fbtn{width:100%;margin-top:10px;background:none;border:1.5px solid var(--bdr);border-radius:11px;padding:11px;font-size:13px;font-weight:600;color:var(--pri);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.fbtn:hover{background:var(--pri-l);border-color:var(--pri)}

/* Source panel (AI mode right) */
.src-panel{width:290px;flex-shrink:0}
.src-hd{font-size:14px;font-weight:600;margin-bottom:11px;padding:0 3px}
.src-empty{background:var(--sur);border-radius:11px;padding:36px 18px;text-align:center;border:1px solid var(--bdr)}
.src-card{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:13px;margin-bottom:9px;cursor:pointer;transition:all .15s}
.src-card:hover{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
.src-card.ext{border-color:var(--ai-b)}
.src-card.ext:hover{border-color:var(--ai);box-shadow:0 0 0 3px var(--ai-l)}
.src-meta{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.src-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.sb-post{background:#f0fdf4;color:#16a34a}.sb-task{background:#eff6ff;color:#2563eb}
.sb-file{background:#fdf4ff;color:#9333ea}.sb-wiki{background:#f0fdfa;color:#0d9488}
.sb-cal{background:#fff1f2;color:#be123c}.sb-email{background:#faf5ff;color:#7c3aed}
.sb-chat{background:#eff6ff;color:#2563eb}
.src-proj{font-size:11px;color:var(--mut);margin-left:auto}
.src-date{font-size:11px;color:var(--mut)}
.src-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px}
.src-prev{font-size:12px;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden}
.src-author{font-size:11px;color:var(--mut);margin-top:5px}
.src-dest{font-size:11px;margin-top:4px}
.d-int{color:var(--pri)}.d-ext{color:var(--ai)}

/* ──────────────────────────────── BROWSE LAYOUT */
.browse-layout{display:flex;gap:20px;align-items:flex-start;padding-bottom:40px}
.browse-main{flex:1;min-width:0}

/* 검색 결과 그룹 */
.res-group{background:var(--sur);border-radius:12px;margin-bottom:16px;overflow:hidden;border:1px solid var(--bdr)}
.res-group-hd{display:flex;align-items:center;gap:8px;padding:14px 18px 12px;border-bottom:1px solid var(--bdr)}
.res-group-title{font-size:15px;font-weight:700;color:var(--txt)}
.res-group-cnt{font-size:13px;font-weight:600;color:var(--pri);background:var(--pri-l);border-radius:12px;padding:1px 8px}
.res-more{margin-left:auto;font-size:12.5px;color:var(--pri);cursor:pointer;font-weight:500}
.res-more:hover{text-decoration:underline}

/* 개별 결과 아이템 — flow 실제 UI 스타일 */
.res-item{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .12s;align-items:flex-start}
.res-item:last-child{border-bottom:none}
.res-item:hover{background:#f9fafb}
.res-item-ico{width:32px;height:32px;border-radius:6px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;color:#6b7280}
.res-item-body{flex:1;min-width:0}
.res-item-title{font-size:14px;font-weight:500;color:var(--pri);margin-bottom:4px;line-height:1.45}
.res-item-title mark{background:none;color:var(--pri);font-weight:700;padding:0}
.res-item-preview{font-size:12.5px;color:var(--sub);line-height:1.6;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden;-webkit-box-orient:vertical}
.res-item-preview mark{background:none;color:var(--txt);font-weight:700;padding:0}
.res-item-meta{display:flex;align-items:center;gap:0;font-size:12px;color:var(--mut);flex-wrap:wrap}
.res-item-meta .pipe{margin:0 6px;opacity:.3}
.res-item-meta .type-badge{font-size:11.5px;color:var(--mut)}
.res-item-meta .dot-sep{opacity:.4}

/* ES only banner */
.es-banner{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.es-banner-ico{font-size:26px;flex-shrink:0;opacity:.5}
.es-banner-body h3{font-size:14px;font-weight:600;color:var(--sub);margin-bottom:4px}
.es-banner-body p{font-size:13px;color:var(--mut);line-height:1.5}
.es-on-btn{margin-top:10px;background:none;border:1.5px solid var(--ai-b);border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ai);cursor:pointer;font-family:inherit;transition:all .2s}
.es-on-btn:hover{background:var(--ai-l)}

/* ──────────────────────────────── FILTER PANEL */
.filter-panel{width:280px;flex-shrink:0}
.flow-ai-card{background:var(--sur);border:1.5px solid var(--ai-b);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s}
.flow-ai-card:hover{background:var(--ai-l)}
.flow-ai-label{font-size:15px;font-weight:700;color:var(--ai)}
.flow-ai-arrow{color:var(--ai);font-size:16px}
.filter-box{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:16px}
.filter-section{margin-bottom:18px}
.filter-section:last-child{margin-bottom:0}
.filter-label{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.f-chip{font-size:12.5px;padding:5px 11px;border-radius:16px;border:1px solid var(--bdr);background:var(--bg);color:var(--sub);cursor:pointer;transition:all .15s;font-family:inherit}
.f-chip:hover{border-color:var(--pri);color:var(--pri)}
.f-chip.on{background:var(--pri-l);border-color:var(--pri);color:var(--pri);font-weight:600}
.filter-input{width:100%;border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--txt);outline:none;transition:border-color .15s;background:var(--bg)}
.filter-input:focus{border-color:var(--pri);background:var(--sur)}
.filter-input::placeholder{color:var(--mut)}
.filter-reset{font-size:12px;color:var(--mut);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s}
.filter-reset:hover{color:var(--pri)}
.filter-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.filter-title{font-size:14px;font-weight:600}

/* 프로젝트 내부 검색 스코프 칩 */
.scope-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:#f0f0ff;border:1.5px solid #c7d7fd;
  border-radius:20px;padding:5px 12px;
  font-size:13px;font-weight:600;color:#3730a3;
  white-space:nowrap;flex-shrink:0;user-select:none;
}
.scope-chip .scope-x{
  opacity:.5;font-size:13px;cursor:pointer;margin-left:2px;
  border-radius:50%;padding:0 2px;transition:all .15s;
}
.scope-chip .scope-x:hover{opacity:1;background:#c7d7fd}

/* 컨텍스트 전환 토글 (데모용) */
.ctx-toggle{
  position:fixed;bottom:20px;left:20px;z-index:300;
  background:#fff;border:1px solid var(--bdr);border-radius:12px;
  padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,.1);
  font-size:12.5px;color:var(--sub);
}
.ctx-toggle .ctx-title{font-weight:700;color:var(--txt);margin-bottom:8px;font-size:13px}
.ctx-btn{
  display:block;width:100%;text-align:left;
  background:var(--bg);border:1px solid var(--bdr);border-radius:8px;
  padding:7px 12px;font-size:12px;color:var(--sub);
  cursor:pointer;font-family:inherit;margin-bottom:5px;transition:all .15s;
}
.ctx-btn:last-child{margin-bottom:0}
.ctx-btn:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}
.ctx-btn.active{border-color:var(--pri);color:var(--pri);background:var(--pri-l);font-weight:600}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .22s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .25s ease forwards}

/* ── 서브 필터 (동적) */
.sub-filter-box{background:#faf9ff;border:1px solid var(--ai-b);border-radius:10px;padding:13px 14px;margin-top:12px;animation:fi .2s ease}
.sub-filter-title{font-size:11.5px;font-weight:700;color:var(--ai);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sub-filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.sub-filter-input{width:100%;border:1px solid var(--ai-b);border-radius:7px;padding:7px 11px;font-size:12.5px;font-family:inherit;color:var(--txt);outline:none;background:#fff;margin-top:6px}
.sub-filter-input:focus{border-color:var(--ai)}
.sub-filter-input::placeholder{color:var(--mut)}
.sf-chip{font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid var(--ai-b);background:#fff;color:var(--ai);cursor:pointer;transition:all .15s;font-family:inherit}
.sf-chip:hover{background:var(--ai-l)}
.sf-chip.on{background:var(--ai);color:#fff;border-color:var(--ai);font-weight:600}
.vote-bar-wrap{margin-top:8px}
.vote-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.vote-bar-label{width:60px;color:var(--sub);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vote-bar-bg{flex:1;height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.vote-bar-fill{height:100%;border-radius:4px;background:var(--ai)}
.vote-bar-pct{width:30px;text-align:right;color:var(--sub);font-size:11px;flex-shrink:0}

/* ── 업무 결과 아이템 특수 스타일 */
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px}
.task-status{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.ts-wait{background:#eff6ff;color:#2563eb}
.ts-progress{background:#f0fdf4;color:#16a34a}
.ts-done{background:#f3f4f6;color:#6b7280}
.ts-test{background:#fef9c3;color:#92400e}
.ts-hold{background:#fdf2f8;color:#9d174d}
.task-progress-bar{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;min-width:60px;position:relative}
.task-progress-fill{height:100%;border-radius:3px;background:var(--pri);max-width:100%;display:block}
.task-progress-pct{font-size:11px;color:var(--mut);flex-shrink:0}
.task-assignee{font-size:11.5px;color:var(--sub)}
.task-deadline{font-size:11.5px;color:var(--mut)}
.task-deadline.overdue{color:#dc2626;font-weight:600}
.task-priority{font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:8px}
.tp-high{background:#fff1f2;color:#be123c}
.tp-normal{background:#f3f4f6;color:#6b7280}
.tp-urgent{background:#fef2f2;color:#dc2626}

/* ── 히스토리 아이템 */
.history-item{display:flex;gap:13px;padding:12px 18px;border-bottom:1px solid #f9fafb;align-items:flex-start}
.history-item:last-child{border-bottom:none}
.history-line{display:flex;align-items:center;gap:7px;font-size:12.5px;margin-bottom:3px;flex-wrap:wrap}
.h-from{color:var(--sub);text-decoration:line-through}
.h-arrow{color:var(--mut);font-size:11px}
.h-to{font-weight:700;color:var(--txt)}
.h-who{font-size:11.5px;color:var(--mut)}

/* ── 파일 내부 콘텐츠 미리보기 */
.file-snippet{background:#f8f9ff;border-left:3px solid var(--pri-b);border-radius:0 6px 6px 0;padding:7px 10px;margin-top:5px;font-size:12px;color:var(--sub);line-height:1.6}
.file-snippet mark{background:#fef9c3;color:inherit}

/* ── 드라이브 아이콘 */
.drive-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;background:#d1fae5;color:#065f46;border-radius:4px;padding:1px 6px;margin-left:4px;vertical-align:middle}

/* ── 캘린더 결과 아이템 */
.cal-item{display:flex;gap:13px;padding:14px 18px;border-bottom:1px solid #f9fafb;cursor:pointer;transition:background .12s;align-items:flex-start}
.cal-item:last-child{border-bottom:none}
.cal-item:hover{background:#fafafe}
.cal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.cal-body{flex:1;min-width:0}
.cal-title{font-size:13.5px;font-weight:600;color:var(--txt);margin-bottom:4px}
.cal-time{font-size:12.5px;color:var(--sub);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.cal-location{font-size:11.5px;color:var(--mut);background:#f3f4f6;border-radius:5px;padding:1px 7px;display:inline-block}
.cal-attendees{font-size:11.5px;color:var(--mut);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cal-attendee-chip{background:#eff6ff;color:#2563eb;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:500}
.cal-type-badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;margin-right:4px}
.ct-meeting{background:#d1fae5;color:#065f46}
.ct-leave{background:#fee2e2;color:#b91c1c}
.ct-halfday{background:#fef9c3;color:#92400e}
.ct-birthday{background:#fce7f3;color:#be185d}
.inline-vote{background:#faf9ff;border:1px solid var(--ai-b);border-radius:8px;padding:10px 14px;margin-top:7px}
.inline-vote-title{font-size:11.5px;font-weight:700;color:var(--ai);margin-bottom:8px}

.task-status-clickable{cursor:pointer;transition:filter .15s}
.task-status-clickable:hover{filter:brightness(.9);outline:2px solid rgba(109,40,217,.3);outline-offset:1px}
.task-assignee-chip{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;color:var(--sub);background:#f3f4f6;border-radius:10px;padding:2px 8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.task-assignee-chip:hover{background:#ede9fe;color:var(--ai);border-color:var(--ai-b)}
.sf-chip-person{display:inline-flex;align-items:center}
.sf-chip-person.on{background:var(--ai);color:#fff;border-color:var(--ai)}

/* ── 채팅 검색 결과 */
.chat-item{display:flex;gap:11px;padding:12px 18px;border-bottom:1px solid #f9fafb;cursor:pointer;transition:background .12s;align-items:flex-start}
.chat-item:last-child{border-bottom:none}
.chat-item:hover{background:#fafafe}
.chat-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.chat-body{flex:1;min-width:0}
.chat-header{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.chat-name{font-size:13px;font-weight:700;color:var(--txt)}
.chat-date{font-size:11.5px;color:var(--mut)}
.chat-room{font-size:11px;color:var(--mut);background:#f3f4f6;border-radius:5px;padding:1px 6px;margin-left:auto}
.chat-msg{font-size:13px;color:var(--sub);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;overflow:hidden;-webkit-box-orient:vertical}
.chat-msg mark{background:#fef9c3;color:inherit;border-radius:2px;padding:0 1px}

/* ── 할일 결과 */
.todo-item{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid #f9fafb;cursor:pointer;transition:background .12s}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:#fafafe}
.todo-status{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0;white-space:nowrap}
.todo-s-progress{background:#dcfce7;color:#16a34a}
.todo-s-fb{background:#fce7f3;color:#be185d}
.todo-s-wait{background:#e0f2fe;color:#0369a1}
.todo-s-done{background:#f3f4f6;color:#6b7280}
.todo-s-review{background:#fef3c7;color:#92400e}
.todo-title{flex:1;font-size:13px;color:var(--txt);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.todo-deadline{font-size:11.5px;color:var(--mut);flex-shrink:0}
.todo-deadline.overdue{color:#dc2626;font-weight:600}
.todo-priority{font-size:14px;flex-shrink:0}

/* ── 위키 파일·업무 임베드 */
.wiki-task-embed{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:9px 13px;margin-top:7px;display:flex;align-items:center;gap:8px;font-size:12.5px}
.wiki-task-embed-status{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0}
.wiki-task-embed-title{color:var(--txt);font-weight:500}
.wiki-task-embed-meta{color:var(--mut);font-size:11px;margin-left:auto;flex-shrink:0}

/* ── 해시태그 모드 */
.dd-hashtag-banner{display:flex;align-items:center;gap:8px;background:#faf9ff;border:1px solid var(--ai-b);border-radius:8px;padding:8px 12px;margin:0 0 6px;font-size:13px;color:var(--ai);font-weight:500}

/* ── 파일 매칭 배지 */
.match-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.mb-name{background:#fef9c3;color:#92400e}
.mb-content{background:#ede9fe;color:var(--ai)}
.mb-drive{background:#d1fae5;color:#065f46}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
</style>
</head>
<body>

<div class="ov" id="ov" onclick="closeDd()"></div>

<header class="hd">
  <div class="logo">flow</div>
  <div class="sw">
    <div class="sbox" id="sbox" onclick="openDd()">
      <div style="display:flex;align-items:center;gap:7px;flex:1;overflow:hidden">
        <div class="sbox-mode" id="sboxMode">✦ AI 검색</div>
        <span class="sbox-ph" id="sph">업무, 파일, 대화를 자연어로 검색해보세요</span>
      </div>
      <span class="sbox-sk">alt+k / cmd+k</span>
    </div>

    <div class="dd" id="dd" style="display:none">
      <div class="dd-top">
        <!-- 스코프 칩 + 입력창 -->
        <div class="dd-inp-row">
          <div id="scopeChip"></div>
          <input class="dd-inp" id="ddinp" placeholder="찾으실 내용을 키워드 또는 자연어로 입력하세요"
            onkeydown="onKey(event)" oninput="onInput(event)" />
          <button class="dd-inp-clear" id="inpClr" onclick="clearInp()" style="display:none">×</button>
        </div>
        <!-- 탭 필터: 컨텍스트에 따라 렌더 -->
        <div class="dd-tabs-wrap" id="ddTabsWrap"></div>
      </div>
      <div class="dd-rec">
        <div class="dd-rec-hd">
          <span class="dd-rec-ttl">최근 검색</span>
          <button class="dd-rec-clr" onclick="clearRec()">전체삭제</button>
        </div>
        <div id="recList"></div>
      </div>

  </div>
  <div class="hd-icons"><span>N</span><span>W</span><span>AI</span><span>⊞</span><span>⚇</span></div>
</header>

<div class="page">
  <!-- EMPTY -->
  <div class="empty" id="emptyS">
    <div class="empty-logo">flow AI 검색 · 데모</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="empty-hint" style="margin-bottom:0">아래 시나리오를 클릭해 각 기능을 체험해보세요</div>
      <button id="toggleNumBtn" onclick="toggleFeedbackNums()" style="font-size:11.5px;color:var(--mut);background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">① 피드백 번호 숨기기</button>
    </div>

    <!-- 1행: 정보·문서 / 일정·연락 / 업무 -->
    <div class="demo-grid">
      <div class="demo-group">
        <div class="demo-group-title">🔍 정보·문서 조회 <span class="num-badge-sm">1</span><span class="num-badge-sm">2</span><span class="num-badge-sm">12</span><span class="num-badge-sm">13</span><span class="num-badge-sm">14</span></div>
        <button class="demo-btn" onclick="qs('신년사',null,'올해 신년사 내용이 뭐야?')">올해 신년사 내용이 뭐야?</button>
        <button class="demo-btn" onclick="qs('온트너',null,'온트너 관련해서 정리해줘')">온트너 관련해서 정리해줘</button>
        <button class="demo-btn" onclick="qs('계약서 2026',null,'2026년 계약서 관련 내용 찾아줘')">2026년 계약서 관련 내용 찾아줘</button>
        <button class="demo-btn" onclick="qs('위키 검색: 개인정보처리방침','wiki','개인정보처리방침 어디 있어?')">개인정보처리방침 어디 있어?  <span class="num-badge">12</span></button>
        <button class="demo-btn" onclick="qs('위키 검색: 파일 첨부 문서','wiki','위키에 첨부된 파일 찾아줘')">위키에 첨부된 파일 찾아줘  <span class="num-badge">13</span></button>
        <button class="demo-btn" onclick="qs('위키 검색: 업무 연결 콘텐츠','wiki','위키에 연결된 업무·게시글 보여줘')">위키에 연결된 업무·게시글  <span class="num-badge">14</span></button>
      </div>
      <div class="demo-group">
        <div class="demo-group-title">📅 일정·연락 <span class="num-badge-sm">3</span></div>
        <button class="demo-btn" onclick="qs('캘린더 검색: 다음 주 일정','cal','다음 주 일정 정리해줘')">다음 주 일정 정리해줘</button>
        <button class="demo-btn" onclick="qs('캘린더 검색: 신주경 참석 일정','cal','신주경 참석하는 회의 언제야?')">신주경 참석하는 회의 언제야?  <span class="num-badge">3</span></button>
        <button class="demo-btn" onclick="qs('캘린더 검색: 이번 주 오전 회의','cal','이번 주 오전에 잡힌 회의 알려줘')">이번 주 오전 잡힌 회의 알려줘  <span class="num-badge">3</span></button>
        <button class="demo-btn" onclick="qs('이메일 검색: 계약 관련 메일','email','계약 관련 이메일 정리해줘')">계약 관련 이메일 정리해줘</button>
        <button class="demo-btn" onclick="qs('이메일 검색: 신규 입사 안내','email','신규 입사 안내 이메일 있어?')">신규 입사 안내 이메일 있어?</button>
        <button class="demo-btn" onclick="qs('이메일 검색: 미팅 리마인더','email','오늘 미팅 리마인더 온 거 있어?')">오늘 미팅 리마인더 온 거 있어?</button>
      </div>
      <div class="demo-group">
        <div class="demo-group-title">📋 업무 · 할일 <span class="num-badge-sm">2</span><span class="num-badge-sm">5</span></div>

function routeNL(q){
  const lower = q.toLowerCase();
  for(const route of NL_ROUTES){
    if(route.keywords.some(kw => lower.includes(kw.toLowerCase()))){
      return route;
    }
  }
  return null;
}
